<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieHub — Movies, Anime & Series</title>
    <meta name="description" content="Discover movies, anime and web series. Save favorites, create lists, watch trailers." />
    <meta name="theme-color" content="#ef4444" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon (local logo) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo/logo.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:title" content="MovieHub" />
    <meta property="og:description" content="Your personal streaming discovery app" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}))
      }
    </script>
  </body>
</html>
